name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (如 v1.0.1)'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            ## edgetunnel v2 — ${{ inputs.version }}

            - 模块化重构版本（29 模块 → 单文件 bundle）
            - 复制 `_worker.bundle.js` 到 Cloudflare Workers Dashboard 即可部署

            ### 部署方式
            Dashboard 直接粘贴 `_worker.bundle.js`

            ### 环境变量
            | 变量 | 说明 |
            |------|------|
            | `UUID` / `ADMIN` / `PASSWORD` | 管理员密码 |
            | `HOST` | 自定义域名 |
            | `PROXYIP` | 反代IP |
            | `KV` | KV 命名空间绑定 |
          files: _worker.bundle.js